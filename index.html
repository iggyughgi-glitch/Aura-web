<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>SAPPHIRE — Private Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --teal:#00F0FF;
  --teal-2:#00D4E0;
  --bg:#020308;
  --ink:#E6FDFF;
  --muted:#8BA3AD;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:"Instrument Sans",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center}
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(800px 600px at 50% -10%,rgba(0,240,255,.18),transparent 60%),
  radial-gradient(600px 400px at 80% 20%,rgba(0,212,224,.12),transparent 60%),
  radial-gradient(500px 500px at 20% 80%,rgba(0,240,255,.08),transparent 60%),
  #020308}
.bg::after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:44px 44px;opacity:.5}

main{position:relative;z-index:2;width:100%;max-width:420px;min-height:100dvh;padding:env(safe-area-inset-top) 20px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column}

.view{display:none;flex-direction:column;min-height:80vh}
.view.active{display:flex;animation:viewIn .4s cubic-bezier(.2,.8,.2,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

#home-view{align-items:center;justify-content:center;text-align:center;padding-top:8vh}

.hero{position:relative;width:140px;height:168px;display:grid;place-items:center;margin-bottom:18px}
.diamond-halo{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,240,255,.22) 0%,rgba(0,240,255,.08) 40%,transparent 70%);filter:blur(18px);animation:halo 4s ease-in-out infinite}
@keyframes halo{0%,100%{transform:scale(.96);opacity:.8}50%{transform:scale(1.06);opacity:1}}

.diamond-svg{width:112px;height:136px;filter:drop-shadow(0 0 28px rgba(0,240,255,.4)) drop-shadow(0 0 60px rgba(0,240,255,.18));transform-origin:50% 42%;animation:float 6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotateX(0)}50%{transform:translateY(-6px) rotateX(4deg)}}

.wordmark{font-size:26px;letter-spacing:.42em;font-weight:600;margin:8px 0 6px;color:#cfffff;text-shadow:0 0 22px rgba(0,240,255,.35)}
.tag{font-family:"Fragment Mono",monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

.search-wrap{position:relative;width:100%;max-width:360px;margin:34px auto 0}
.search-bar{display:flex;align-items:center;gap:10px;height:54px;padding:0 18px 0 20px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(0,240,255,.22);border-radius:999px;backdrop-filter:blur(16px) saturate(140%);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 28px rgba(0,0,0,.45),0 0 0 rgba(0,240,255,0);transition:.25s}
.search-bar:focus-within{border-color:rgba(0,240,255,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 34px rgba(0,0,0,.55),0 0 32px rgba(0,240,255,.18)}
.search-bar svg{width:18px;height:18px;stroke:var(--teal);opacity:.9;flex-shrink:0}
.search-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--ink);font-size:16px;font-weight:450;letter-spacing:.01em}
.search-bar input::placeholder{color:#6f8791}
.search-go{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 30% 20%,var(--teal),var(--teal-2));box-shadow:0 0 16px rgba(0,240,255,.45),inset 0 1px 1px rgba(255,255,255,.4);display:grid;place-items:center;transition:.15s}
.search-go:active{transform:scale(.94)}
.search-go svg{width:16px;height:16px;stroke:#002a30;stroke-width:2.5}

.live-count{margin-top:14px;font-family:"Fragment Mono",monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#7eeef5;display:flex;align-items:center;gap:8px;justify-content:center;opacity:.9}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}

.foot{margin-top:auto;padding-top:32px;text-align:center;font-family:"Fragment Mono",monospace;font-size:10px;letter-spacing:.12em;color:#5b6e77;opacity:.75}

/* Results */
#results-view{padding-top:24px}
.results-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.back-btn{width:36px;height:36px;border-radius:12px;border:1px solid rgba(0,240,255,.2);background:rgba(255,255,255,.03);display:grid;place-items:center;cursor:pointer;color:var(--teal)}
.results-title{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:"Fragment Mono"}

.results-list{display:flex;flex-direction:column;gap:12px}
.res-card{position:relative;padding:16px 16px 16px 54px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(0,240,255,.14);border-radius:18px;cursor:pointer;transition:.18s;overflow:hidden}
.res-card:hover{border-color:rgba(0,240,255,.34);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 20px rgba(0,240,255,.08)}
.res-id{position:absolute;left:14px;top:16px;width:28px;height:28px;display:grid;place-items:center;font-family:"Fragment Mono";font-size:11px;color:var(--teal);background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.22);border-radius:9px}
.res-card h3{font-size:16px;font-weight:600;line-height:1.3;margin-bottom:6px;padding-right:10px}
.res-card p{font-size:13.5px;line-height:1.45;color:#b7c9cf;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.res-domain{margin-top:8px;font-family:"Fragment Mono";font-size:10.5px;letter-spacing:.08em;color:#7ab8c0;text-transform:lowercase}

/* Reader */
#reader-view{padding-top:20px}
.reader-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.reader-title{font-size:18px;font-weight:600;line-height:1.25;flex:1}
.reader-meta{font-family:"Fragment Mono";font-size:11px;color:var(--muted);margin:6px 0 18px}
.reader-actions{display:flex;gap:10px;margin-bottom:20px}
.pill{padding:9px 14px;border-radius:999px;font-size:12.5px;font-weight:500;border:1px solid rgba(0,240,255,.24);background:rgba(0,240,255,.08);color:var(--teal);text-decoration:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.pill.secondary{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12);color:#cfe5ea}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{width:22px;height:22px;border:2px solid rgba(0,240,255,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:380px){.wordmark{font-size:22px;letter-spacing:.38em}}

.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:26px;max-width:280px;margin-left:auto;margin-right:auto}
.app-node{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;cursor:pointer}
.app-icon{width:52px;height:52px;background:linear-gradient(160deg,rgba(0,240,255,.09),rgba(10,12,20,.7));border:1px solid rgba(0,240,255,.22);border-radius:16px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);box-shadow:0 4px 18px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);transition:transform .12s}
.app-icon svg{width:22px;height:22px;stroke:#00F0FF;stroke-width:1.8;filter:drop-shadow(0 0 6px rgba(0,240,255,.4))}
.app-node:active .app-icon{transform:scale(.92)}
.app-label{font-size:9px;color:#999;letter-spacing:1.4px;text-transform:uppercase;font-weight:700}
.app-node:nth-child(2) .app-icon svg{stroke:#A0426E;filter:drop-shadow(0 0 6px rgba(160,66,110,.4))}
.app-node:nth-child(2) .app-icon{border-color:rgba(160,66,110,.25);background:linear-gradient(160deg,rgba(160,66,110,.09),rgba(10,12,20,.7))}
.app-node:nth-child(3) .app-icon svg{stroke:#4EADA0}
.app-node:nth-child(3) .app-icon{border-color:rgba(78,173,160,.25);background:linear-gradient(160deg,rgba(78,173,160,.09),rgba(10,12,20,.7))}
.app-node:nth-child(4) .app-icon svg{stroke:#C9A84C}
.app-node:nth-child(4) .app-icon{border-color:rgba(201,168,76,.25);background:linear-gradient(160deg,rgba(201,168,76,.09),rgba(10,12,20,.7))}
</style>
</head>

<script>
const $ = s => document.querySelector(s);
const homeView = $('#home-view');
const resultsView = $('#results-view');
const readerView = $('#reader-view');
const q = $('#q');
const go = $('#go');
const resultsEl = $('#results');
const resultsQuery = $('#resultsQuery');
let currentReader = null;

// Physics-like search interaction
let searchVelocity = 0;
q.addEventListener('input', () => {
  searchVelocity = Math.min(1, q.value.length / 12);
  $('.diamond-svg').style.filter = `drop-shadow(0 0 ${28 + searchVelocity*12}px rgba(0,240,255,${.4+searchVelocity*.2}))`;
});
q.addEventListener('blur', ()=>{$('.diamond-svg').style.filter='';});

function showHome(){
  homeView.classList.add('active');
  resultsView.classList.remove('active');
  readerView.classList.remove('active');
  q.value=''; q.focus();
}
function showResults(query){
  homeView.classList.remove('active');
  readerView.classList.remove('active');
  resultsView.classList.add('active');
  resultsQuery.textContent = `"${query}"`;
}

async function doSearch(){
  const query = q.value.trim();
  if(!query) return;
  showResults(query);
  resultsEl.innerHTML = `<div class="empty"><div class="spinner"></div>Searching untangled web…</div>`;
  
  // search physics burst
  document.querySelector('.diamond-halo').style.transform='scale(1.2)';
  setTimeout(()=>document.querySelector('.diamond-halo').style.transform='', 300);
  
  try{
    const items = await fetchSearchResults(query);
    if(!items.length) throw new Error('NO_RESULTS');
    resultsEl.innerHTML = items.map(item => `
      <article class="res-card" data-id="${item.id}">
        <div class="res-id">${item.id}</div>
        <h3>${item.title}</h3>
        <p>${item.desc}</p>
        <div class="res-domain">${item.domain} • ${item.source==='wiki'?'wiki':'web'}</div>
      </article>
    `).join('');
    resultsEl.querySelectorAll('.res-card').forEach((el,i)=>{
      el.addEventListener('click',()=>openReader(items[i]));
    });
  }catch(e){
    resultsEl.innerHTML = `<div class="empty">No results. Try different terms.</div>`;
  }
}

function openReader(data){
  currentReader = data;
  readerView.classList.add('active');
  resultsView.classList.remove('active');
  homeView.classList.remove('active');
  $('#readerTitle').textContent = data.title;
  $('#readerMeta').textContent = `${data.domain} • ID ${data.id}`;
  $('#openOriginal').href = data.url;
  $('#readerContent').innerHTML = `<p style="margin-bottom:12px;opacity:.9">${data.desc}</p><p style="font-size:13px;color:#8aa;">Sapphire Reader removes trackers, ads, and paywalls where possible. This is a privacy preview — open source for full content.</p>`;
  window.scrollTo(0,0);
}
function closeReader(){
  readerView.classList.remove('active');
  if(resultsEl.children.length) resultsView.classList.add('active');
  else showHome();
}
function copyLink(){
  if(!currentReader) return;
  navigator.clipboard.writeText(currentReader.url).then(()=>{
    const b = event.target.closest('.pill');
    const t = b.innerHTML;
    b.innerHTML = '✓ Copied';
    setTimeout(()=>b.innerHTML=t,1200);
  });
}

async function fetchSearchResults(query) {
    const getDomain = url => { try { return new URL(url).hostname.replace('www.',''); } catch { return ''; } };
    
    // Wikipedia - FREE, no key, CORS enabled
    const wikiPromise = fetch(`https://en.wikipedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=3&prop=extracts|pageimages&exintro&explaintext&exsentences=2&pithumbsize=200&format=json&origin=*`)
        .then(r => r.json())
        .then(d => {
            if (!d.query?.pages) return [];
            return Object.values(d.query.pages).map(p => ({
                id: 'W' + p.pageid,
                title: p.title,
                desc: p.extract || 'Wikipedia article',
                url: `https://en.wikipedia.org/wiki/${encodeURIComponent(p.title.replace(/ /g,'_'))}`,
                domain: 'wikipedia.org',
                source: 'wiki'
            }));
        }).catch(() => []);

    // Serper (your existing)
    const serperPromise = fetch('https://google.serper.dev/search', {
        method: 'POST',
        headers: {'X-API-KEY': 'bdb6eaaf192f22e8f9a6280fe9848c961bdaefa8','Content-Type': 'application/json'},
        body: JSON.stringify({ q: query, num: 10 }),
        signal: AbortSignal.timeout(10000)
    }).then(r => r.ok ? r.json() : {}).then(data => (data.organic || []).map((r,i) => ({
        id: String(i+1).padStart(2,'0'),
        title: r.title,
        desc: r.snippet || r.title,
        url: r.link,
        domain: getDomain(r.link),
        source: 'web'
    }))).catch(() => []);

    const [wiki, web] = await Promise.all([wikiPromise, serperPromise]);
    const seen = new Set();
    const merged = [];
    [...wiki, ...web].forEach(r => {
        if (r.url && !seen.has(r.domain)) { seen.add(r.domain); merged.push(r); }
    });
    if (merged.length === 0) throw new Error('NO_RESULTS');
    return merged.slice(0,10);
}

go.addEventListener('click', doSearch);
q.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); });

// live count physics
const liveNum = $('#liveNum');
let count = 1284;
setInterval(()=>{
  count += Math.floor(Math.random()*3);
  liveNum.textContent = count.toLocaleString();
  liveNum.style.textShadow = '0 0 12px rgba(0,240,255,.7)';
  setTimeout(()=>liveNum.style.textShadow='', 400);
}, 4200);

window.addEventListener('load', ()=>{
  q.focus();
  // diamond idle physics
  let t=0;
  setInterval(()=>{
    t+=0.015;
    const d = document.querySelector('.diamond-halo');
    if(d) d.style.opacity = 0.75 + Math.sin(t)*0.15;
  },50);
  if(window.lucide) lucide.createIcons();
});

// swipe back
let touchStartX=0;
document.addEventListener('touchstart',e=>touchStartX=e.touches[0].clientX,{passive:true});
document.addEventListener('touchend',e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(dx>70){
    if(readerView.classList.contains('active')) closeReader();
    else if(resultsView.classList.contains('active')) showHome();
  }
});
