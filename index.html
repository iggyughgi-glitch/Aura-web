<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura — The Sanctuary</title>
    <meta name="description" content="The world's first AI-powered web browser built for women. Private, safe, and empowering.">
    <meta property="og:title" content="Aura — The Sanctuary">
    <meta property="og:description" content="The world's first AI-powered web browser built for women.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --black:   #040406;
            --surface: rgba(10, 10, 16, 0.98);
            --border:  rgba(255,255,255,0.07);
            --gold:    #C9A84C;
            --teal:    #4EADA0;
            --berry:   #A0426E;
            --fashion: #B87ED4;
            --health:  #E8917A;
            --white:   #FDFCFA;
            --muted:   #7A7A82;
            --nav-h:   130px;
            --hud-bg:  #050507;
            --hud-accent: #00F0FF;
            --hud-grid: rgba(0,240,255,0.05);
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: #FAFAF8; color: #0D0D0D; font-family: 'DM Sans', sans-serif; }

        /* ── HOME VIEW ── */
        #home-view {
            height: calc(100vh - var(--nav-h));
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 0 32px;
            transition: filter 0.5s ease, opacity 0.4s ease;
        }
        #home-view.blurred { filter: blur(8px) brightness(0.85); pointer-events: none; }
        #home-view.hidden  { opacity: 0; pointer-events: none; }

        .brand-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px; }
        .brand-diamond { animation: diamond-pulse 3s ease-in-out infinite; flex-shrink:0; margin-top:6px; }
        .brand { font-family: 'Playfair Display', serif; font-size: clamp(62px,18vw,88px); font-weight: 900; letter-spacing: -3px; line-height: 1; color: #0A0A0A; margin-bottom: 0; }
        .tagline { font-size: 13px; color: #888; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }
        .waitlist { margin-top: 52px; width: 100%; max-width: 300px; }
        .waitlist-label { font-size: 10px; text-transform: uppercase; letter-spacing: 4px; font-weight: 700; color: #333; margin-bottom: 8px; }
        .waitlist-desc { font-size: 12px; color: #888; line-height: 1.6; margin-bottom: 28px; }
        .input-row { display: flex; align-items: center; border-bottom: 1.5px solid #D0D0D0; padding-bottom: 10px; transition: border-color 0.3s; }
        .input-row:focus-within { border-color: #0A0A0A; }
        .email-input { flex: 1; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #0A0A0A; background: transparent; }
        .email-input::placeholder { color: #BBB; }
        .btn-submit { background: none; border: none; font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #0A0A0A; cursor: pointer; padding: 0; transition: color 0.3s, opacity 0.3s; white-space: nowrap; }
        .btn-submit:disabled { opacity: 0.4; cursor: default; }
        .live-count { margin-top: 22px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .count-dot { width: 6px; height: 6px; background: var(--teal); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
        .count-num { font-size: 12px; font-weight: 700; color: var(--teal); font-variant-numeric: tabular-nums; }
        .count-label { font-size: 10px; color: #AAA; text-transform: uppercase; letter-spacing: 2px; }

        /* ── SEARCH RESULTS VIEW ── */
        #search-view {
            position: fixed;
            top: 0; left: 0; right: 0;
            bottom: var(--nav-h);
            background: var(--hud-bg);
            background-image:
                linear-gradient(var(--hud-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--hud-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            display: flex;
            flex-direction: column;
        }
        #search-view.visible { opacity: 1; pointer-events: all; }

        /* ── HUD BAR — Diamond Glass Header ── */
        .hud-bar {
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; overflow: hidden; position: relative;

            /* Diamond Glass */
            background: rgba(8, 8, 14, 0.55);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-bottom: 1px solid rgba(0,240,255,0.12);
            box-shadow:
                inset 0 -1px 0 rgba(0,240,255,0.06),
                inset 0 1px 0 rgba(255,255,255,0.05),
                0 8px 32px rgba(0,0,0,0.5);
        }

        /* Portrait: full-width bar */
        @media (orientation: portrait) {
            .hud-bar {
                padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
                flex-direction: row;
            }
        }

        /* Landscape: compact single-line bar */
        @media (orientation: landscape) {
            .hud-bar {
                padding: 10px 16px;
                flex-direction: row;
            }
        }

        /* Facet light inside hud-bar */
        .hud-bar .hud-facet {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background: conic-gradient(
                from 0deg at 50% -20%,
                transparent 0deg,
                rgba(0,240,255,0.04) 60deg,
                transparent 120deg,
                rgba(255,255,255,0.02) 180deg,
                transparent 240deg
            );
            animation: rotate-facet 12s linear infinite;
        }

        /* Shimmer sweep on hud-bar */
        .hud-bar::after {
            content: '';
            position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transform: skewX(-15deg);
            animation: hud-shimmer 7s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes hud-shimmer { 0%,100%{left:-80%} 55%{left:130%} }

        .hud-back {
            width: 34px; height: 34px;
            background: rgba(0,240,255,0.06);
            border: 1px solid rgba(0,240,255,0.22);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--hud-accent); font-size: 15px;
            flex-shrink: 0; transition: background 0.2s, box-shadow 0.2s;
            position: relative; z-index: 1;
            box-shadow: inset 0 0 8px rgba(0,240,255,0.05);
        }
        .hud-back:active { background: rgba(0,240,255,0.18); box-shadow: 0 0 14px rgba(0,240,255,0.2); }

        /* Liquid glass query pill */
        .hud-query-display {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 11px; color: var(--hud-accent);
            letter-spacing: 2px; opacity: 0.85;
            overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
            background: rgba(0,240,255,0.04);
            border: 1px solid rgba(0,240,255,0.1);
            border-radius: 14px;
            padding: 6px 14px;
            text-shadow: 0 0 8px rgba(0,240,255,0.4);
            position: relative; z-index: 1;
        }

        .cards-viewport { flex: 1; display: flex; perspective: 1000px; padding: 20px; gap: 20px; -webkit-overflow-scrolling: touch; }
        .cards-viewport::-webkit-scrollbar { display: none; }
        @media (orientation: portrait)  { .cards-viewport { flex-direction: column; overflow-y: auto; overflow-x: hidden; align-items: center; } }
        @media (orientation: landscape) { .cards-viewport { flex-direction: row; overflow-x: auto; overflow-y: hidden; align-items: center; } }

        .tactical-card { flex: 0 0 auto; width: min(280px, 85vw); height: 260px; background: transparent; border: 1px solid rgba(0,240,255,0.15); box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,240,255,0.02); display: flex; flex-direction: column; justify-content: space-between; padding: 22px; position: relative; transform-style: preserve-3d; transition: transform 0.15s; cursor: pointer; border-radius: 4px; }
        .tactical-card::before, .tactical-card::after { content:''; position:absolute; width:14px; height:14px; }
        .tactical-card::before { top:-1px; left:-1px; border-top:2px solid var(--hud-accent); border-left:2px solid var(--hud-accent); }
        .tactical-card::after  { bottom:-1px; right:-1px; border-bottom:2px solid var(--hud-accent); border-right:2px solid var(--hud-accent); }
        .tactical-card:active  { transform: scale(0.97) !important; }
        .card-telemetry { font-family:'Courier New',monospace; font-size:10px; color:var(--hud-accent); letter-spacing:1px; }
        .card-title { font-weight:800; font-size:20px; color:#E0E0E0; margin:8px 0; line-height:1.2; }
        .card-body  { font-size:12px; color:#666; line-height:1.5; flex:1; margin:4px 0; }
        .card-url   { font-size:10px; color:rgba(0,240,255,0.5); font-family:'Courier New',monospace; letter-spacing:1px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
        .card-footer{ font-size:10px; color:#444; text-transform:uppercase; letter-spacing:1.5px; margin-top:8px; }
        .hud-loading { margin: auto; font-family:'Courier New',monospace; font-size:13px; color:var(--hud-accent); letter-spacing:3px; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── BOTTOM NAV — Diamond Glass ── */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: var(--nav-h);
            border-radius: 28px 28px 0 0;
            padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
            z-index: 600;
            display: flex; flex-direction: column; gap: 12px;
            overflow: hidden;

            /* Diamond Glass foundation */
            background: rgba(8, 8, 14, 0.55);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);

            /* Faceted edge reflections */
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.12),
                inset 1px 0 0 rgba(0,240,255,0.06),
                inset -1px 0 0 rgba(0,240,255,0.06),
                0 -8px 40px rgba(0,0,0,0.6);

            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Rotating facet light overlay */
        #bottom-nav .facet-overlay {
            position: absolute; inset: 0; pointer-events: none; z-index: 0;
            background: conic-gradient(
                from 0deg at 50% 120%,
                transparent 0deg,
                rgba(255,255,255,0.03) 45deg,
                transparent 90deg,
                rgba(0,240,255,0.04) 180deg,
                transparent 270deg
            );
            animation: rotate-facet 10s linear infinite;
        }

        /* Shimmer sweep */
        #bottom-nav::after {
            content: '';
            position: absolute; top: -50%; left: -60%;
            width: 40%; height: 200%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.07),
                transparent
            );
            transform: skewX(-20deg);
            animation: nav-shimmer 6s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }

        @keyframes rotate-facet { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes nav-shimmer  { 0%,100%{left:-60%} 50%{left:120%} }

        /* All direct nav children sit above overlays */
        .tabs, .search-row { position: relative; z-index: 1; }

        .tabs { display:flex; gap:18px; overflow-x:auto; scrollbar-width:none; }
        .tabs::-webkit-scrollbar { display:none; }
        .tab { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); white-space:nowrap; cursor:pointer; transition:color 0.2s; }
        .tab.active { color:#FFF; text-shadow: 0 0 12px rgba(255,255,255,0.4); }
        .tab[data-tab="beauty"]   { color:var(--fashion); opacity:0.7; }
        .tab[data-tab="shopping"] { color:var(--gold);    opacity:0.7; }
        .tab[data-tab="health"]   { color:var(--health);  opacity:0.7; }

        .search-row { display:flex; align-items:center; gap:12px; }

        /* Liquid Glass search pill */
        .search-bar {
            flex: 1;
            background: rgba(13, 17, 23, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0,240,255,0.25);
            border-radius: 22px;
            padding: 0 18px; height: 48px;
            display: flex; align-items: center; gap: 10px;
            box-shadow:
                inset 0 0 12px rgba(0,240,255,0.04),
                0 4px 20px rgba(0,0,0,0.4);
            transition: border-color 0.3s, box-shadow 0.3s;
            overflow: hidden; position: relative;
        }
        .search-bar::before {
            content: '';
            position: absolute; top: 0; left: -80%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,240,255,0.06), transparent);
            animation: pill-shimmer 5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pill-shimmer { 0%,100%{left:-80%} 60%{left:120%} }
        .search-bar:focus-within {
            border-color: rgba(0,240,255,0.55);
            box-shadow: inset 0 0 16px rgba(0,240,255,0.07), 0 0 20px rgba(0,240,255,0.1);
        }
        #search-input { flex:1; background:transparent; border:none; outline:none; font-family:'DM Sans',sans-serif; font-size:13px; color:#DDD; position:relative; z-index:1; }
        #search-input::placeholder { color:rgba(0,240,255,0.35); font-family:'Courier New',monospace; letter-spacing:1px; font-size:12px; }
        .ai-badge { font-size:10px; font-weight:800; color:var(--teal); letter-spacing:1px; white-space:nowrap; text-shadow:0 0 8px var(--teal); position:relative; z-index:1; cursor:pointer; }

        /* ── REAL CUT DIAMOND SVG ── */
        .diamond-btn { width:52px; height:52px; background:rgba(201,168,76,0.04); border:1px solid rgba(201,168,76,0.2); border-radius:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform 0.15s, box-shadow 0.3s; flex-shrink:0; position:relative; z-index:200; -webkit-user-select:none; user-select:none;
            box-shadow: inset 0 0 10px rgba(201,168,76,0.05), 0 4px 15px rgba(0,0,0,0.3);
        }
        .diamond-btn:active { transform:scale(0.88); box-shadow:0 0 22px rgba(180,220,255,0.3), 0 0 8px rgba(201,168,76,0.2); }

        /* Light-sweep animation on the crown */
        @keyframes diamond-light {
            0%   { opacity: 0; transform: translateX(-120%) skewX(-20deg); }
            40%  { opacity: 1; }
            100% { opacity: 0; transform: translateX(180%) skewX(-20deg); }
        }
        @keyframes diamond-pulse {
            0%,100% { filter: drop-shadow(0 0 5px rgba(160,210,255,0.5)) drop-shadow(0 0 2px rgba(255,255,255,0.3)); }
            50%      { filter: drop-shadow(0 0 9px rgba(160,210,255,0.8)) drop-shadow(0 0 4px rgba(255,255,255,0.5)); }
        }
        .cut-diamond {
            animation: diamond-pulse 3s ease-in-out infinite;
            pointer-events: none;
        }
        .diamond-sweep {
            animation: diamond-light 4s ease-in-out infinite;
        }

        /* ── LANDSCAPE: collapse nav to floating orb ── */
        @media (orientation: landscape) {
            :root { --nav-h: 0px; }
            #bottom-nav { display: none; }
            #search-view { bottom: 0; }
            #home-view { height: 100vh; }

            /* Floating orb */
            #search-orb {
                display: flex;
            }
        }
        @media (orientation: portrait) {
            #search-orb { display: none !important; }
        }

        /* Floating search orb — landscape only */
        #search-orb {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 700;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }
        .orb-btn {
            width: 44px; height: 44px;
            background: rgba(0,240,255,0.06);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s, transform 0.15s;
            -webkit-user-select: none; user-select: none;
        }
        .orb-btn:active { transform: scale(0.88); background: rgba(0,240,255,0.15); }
        #orb-search-wrap {
            display: none;
            background: rgba(5,5,7,0.85);
            border: 1px solid rgba(0,240,255,0.2);
            border-radius: 22px;
            padding: 0 14px;
            height: 40px;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        #orb-search-wrap.open { display: flex; }
        #orb-input {
            background: transparent; border: none; outline: none;
            font-family: 'DM Sans', sans-serif; font-size: 12px;
            color: #DDD; width: 140px;
        }
        #orb-input::placeholder { color: rgba(0,240,255,0.4); font-family: 'Courier New', monospace; letter-spacing: 1px; }
        .orb-ai { font-size: 9px; font-weight: 800; color: var(--teal); letter-spacing: 1px; white-space: nowrap; }
        #sanctuary { position:fixed; bottom:-100%; left:0; right:0; height:93%; background:var(--surface); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-radius:36px 36px 0 0; z-index:1000; overflow-y:auto; overflow-x:hidden; padding:20px 22px calc(40px + env(safe-area-inset-bottom)); transition:bottom 0.45s cubic-bezier(0.16,1,0.3,1); -webkit-overflow-scrolling:touch; }
        #sanctuary.open { bottom:0; }
        .handle { width:40px; height:4px; background:rgba(255,255,255,0.12); border-radius:10px; margin:0 auto 28px; }
        .sanctuary-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:900; color:var(--white); margin-bottom:6px; }
        .sanctuary-sub { font-size:13px; color:var(--gold); font-weight:500; margin-bottom:32px; line-height:1.4; }
        .section-label { font-size:10px; font-weight:800; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; margin-top:28px; }
        .tile { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:20px; padding:16px 18px; display:flex; align-items:center; justify-content:space-betwe
