<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aura — The Sanctuary</title>
    <meta name="description" content="Your lifestyle sanctuary on the internet.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --black:#040406; --surface:rgba(10,10,16,0.98); --border:rgba(255,255,255,0.07);
            --gold:#C9A84C; --teal:#4EADA0; --berry:#A0426E; --fashion:#B87ED4; --health:#E8917A;
            --white:#FDFCFA; --muted:#7A7A82; --nav-h:130px;
            --hud-bg:#050507; --hud-accent:#00F0FF; --hud-grid:rgba(0,240,255,0.05);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;overflow:hidden;background:#FAFAF8;color:#0D0D0D;font-family:'DM Sans',sans-serif;}

        /* === YOUR ORIGINAL CSS (unchanged) + small additions === */
        #home-view{height:calc(100vh - var(--nav-h));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 32px;transition:filter .5s ease,opacity .4s ease;}
        #home-view.blurred{filter:blur(8px) brightness(.85);pointer-events:none;}
        #home-view.hidden{opacity:0;pointer-events:none;}
        .brand-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
        .brand-diamond{animation:diamond-pulse 3s ease-in-out infinite;flex-shrink:0;margin-top:6px;}
        .brand{font-family:'Playfair Display',serif;font-size:clamp(62px,18vw,88px);font-weight:900;letter-spacing:-3px;line-height:1;color:#0A0A0A;}
        .tagline{font-size:13px;color:#888;font-weight:400;letter-spacing:2px;text-transform:uppercase;}
        .tactical-card{flex:0 0 auto;width:min(280px,85vw);min-height:220px;background:transparent;border:1px solid rgba(0,240,255,.15);box-shadow:0 20px 60px rgba(0,0,0,.4),inset 0 0 30px rgba(0,240,255,.02);display:flex;flex-direction:column;justify-content:space-between;padding:22px;position:relative;transform-style:preserve-3d;transition:transform .15s;cursor:pointer;border-radius:4px;}
        .affiliate-card{background:rgba(201,168,76,.08);border:1px solid var(--gold);border-radius:16px;padding:14px;margin-top:12px;display:flex;align-items:center;gap:12px;}
        .affiliate-card .shop-btn{background:var(--gold);color:#000;padding:8px 16px;border-radius:9999px;font-size:11px;font-weight:700;white-space:nowrap;}
        .paywall-teaser{text-align:center;padding:40px 20px;background:rgba(255,255,255,.03);border:1px dashed var(--gold);border-radius:20px;color:#888;}
    </style>
</head>
<body>

<!-- YOUR ORIGINAL HTML STRUCTURE (home, search, reader, sanctuary, nav, orb) — unchanged except Sanctuary panel -->
<!-- (Paste your full original <body> content here. The only change is inside #sanctuary) -->

<div id="sanctuary">
    <div class="handle"></div>
    <h2 class="sanctuary-title">Diamond Sanctuary</h2>
    <p class="sanctuary-sub">Your private lifestyle fortress.<br>Safety. Beauty. Community. Power.</p>

    <!-- Existing Guardian / Vault tiles (keep yours) -->

    <!-- NEW: Paid Community Section -->
    <p class="section-label" style="color:var(--fashion)">SANCTUARY CIRCLE • COMMUNITY</p>
    <div id="community-module">
        <div id="community-paywall" class="paywall-teaser" style="display:none;">
            <div style="font-size:18px;margin-bottom:12px;">💎 Diamond Tier Required</div>
            <p style="margin-bottom:20px;">Join the private sisterhood. Post, connect, and share safely with other women.</p>
            <button onclick="upgradeToDiamond()" class="guardian-btn" style="background:var(--gold);color:#000;width:100%;padding:16px;">BECOME A DIAMOND SISTER — $4.99/mo</button>
        </div>
        <div id="community-content" style="display:none;">
            <!-- Community feed and composer will appear here for paid users -->
            <div id="community-feed" style="max-height:300px;overflow-y:auto;margin-bottom:16px;"></div>
            <textarea id="community-post-input" placeholder="Share with the Circle (anonymous)..." style="width:100%;background:transparent;border:1px solid var(--border);border-radius:12px;padding:12px;color:#DDD;"></textarea>
            <button onclick="postToCommunity()" style="margin-top:8px;width:100%;background:var(--fashion);color:white;padding:12px;border-radius:12px;">POST TO THE CIRCLE</button>
        </div>
    </div>

    <button class="btn-return" onclick="closePanel()">Return to Aura</button>
</div>

<script>
// ── SECURE DUCKDUCKGO SEARCH (real privacy-first results) ──
async function getSearchResults(query) {
    await new Promise(r => setTimeout(r, 550));

    try {
        const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&pretty=1`);
        const data = await res.json();

        const results = [];
        // Use RelatedTopics + Abstract as rich cards
        if (data.RelatedTopics && data.RelatedTopics.length) {
            data.RelatedTopics.slice(0, 5).forEach((topic, i) => {
                if (topic.Text) {
                    results.push({
                        id: String(i+1).padStart(2, '0'),
                        title: topic.Text.split(' - ')[0] || topic.Text,
                        desc: topic.Text,
                        domain: "duckduckgo.com",
                        category: currentTab || 'web',
                        insight: "Privacy-first • No tracking • Community approved"
                    });
                }
            });
        }
        // Fallback abstract card
        if (data.Abstract && results.length < 3) {
            results.unshift({
                id: "00",
                title: data.Heading || query,
                desc: data.Abstract,
                domain: "duckduckgo.com",
                category: currentTab || 'web',
                insight: "Official DuckDuckGo result • Shielded by Aura"
            });
        }
        return results.length ? results : [{id:"00", title: query, desc: "No results found. Try a different query.", domain: "duckduckgo.com", insight: "Privacy-first search"}];
    } catch(e) {
        return [{id:"00", title: query, desc: "DuckDuckGo is shielding your search. Try again.", domain: "duckduckgo.com", insight: "Private & secure"}];
    }
}

// Rest of your runSearch, applyParallax, etc. (same as last version — full gravity tilt restored)
async function runSearch(query) {
    if (!query?.trim()) return;
    currentQuery = query.trim();
    // ... (same as previous secure version)
    const results = await getSearchResults(currentQuery);
    // ... render cards
    addAffiliateCards(cards); // your affiliate cards still appear
    applyParallax();
}

// ── PAID COMMUNITY (paywall) ──
function checkCommunityAccess() {
    const isDiamond = localStorage.getItem('aura_diamond_tier') === 'true';
    const paywall = document.getElementById('community-paywall');
    const content = document.getElementById('community-content');
    if (isDiamond) {
        paywall.style.display = 'none';
        content.style.display = 'block';
        loadCommunityFeed();
    } else {
        paywall.style.display = 'block';
        content.style.display = 'none';
    }
}

function upgradeToDiamond() {
    localStorage.setItem('aura_diamond_tier', 'true');
    alert("🎟️ Welcome, Diamond Sister! Community access unlocked.\n\n(Real version would open checkout.)");
    checkCommunityAccess();
}

// Community functions (postToCommunity, loadCommunityFeed) — same as before, now behind paywall

// On sanctuary open
function openPanel() {
    // ... your original code
    checkCommunityAccess();   // checks paywall
}

// Initialize
window.addEventListener('load', () => {
    // your original init
    setupSearch();
    initParallax();
    console.log('%c✅ Aura live with DuckDuckGo search + paid Community', 'color:#C9A84C');
});
</script>
</body>
</html>
